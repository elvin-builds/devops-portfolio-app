replicaCount: 3

image:
  repository: devops-portfolio
  tag: "0.1.0"
  pullPolicy: Always

resources:
  limits:
    cpu: "500m"
    memory: "256Mi"
  requests:
    cpu: "200m"
    memory: "128Mi"

config:
  environment: "production"
  debug: "false"

probes:
  enabled: true
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10

ingress:
  enabled: true
  host: "portfolio.example.com"
