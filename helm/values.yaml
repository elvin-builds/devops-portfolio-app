replicaCount: 1

image:
  repository: devops-portfolio
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: "250m"
    memory: "128Mi"
  requests:
    cpu: "100m"
    memory: "64Mi"

config:
  environment: "development"
  debug: "true"
  port: "5000"

probes:
  enabled: false
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5

ingress:
  enabled: false
  host: "portfolio.local"
